name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (CI=true fails on warnings)
        run: CI=true npm run build

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Audit (report only, do not block on dev-only advisories)
        run: npm audit --omit=dev || true
